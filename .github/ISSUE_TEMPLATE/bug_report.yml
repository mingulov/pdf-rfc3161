name: Bug report
description: Something doesn't work as expected
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: pdf-rfc3161 version
      placeholder: 0.2.x
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: v22.x
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node.js
        - Cloudflare Workers
        - Deno
        - Browser
        - Other
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Code + (if relevant) a small PDF or TSA URL. Smaller the better.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error / stack trace
      render: shell
